name: CI

on:
  push:
    branches: [main]
    paths:
      - "packages/themes/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/themes/**"
      - ".github/workflows/ci.yml"

jobs:
  check:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/themes
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Lint
        run: bun lint

      - name: Type check
        run: bun type-check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
