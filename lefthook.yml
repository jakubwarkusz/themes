pre-commit:
  jobs:
    - name: format-and-lint
      run: bun biome check --write {staged_files}
      glob: "*.{ts,tsx}"
      stage_fixed: true

    - name: type-check-themes
      run: bun run --cwd packages/themes type-check

    - name: type-check-docs
      run: bun run --cwd apps/docs types:check
